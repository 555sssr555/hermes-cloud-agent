<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор прибирання | Multi_Cleaning</title>
  <meta name="description" content="Розрахуйте вартість прибирання онлайн. Калькулятор клінінгових послуг від Multi_Cleaning — Київ та область.">
  <link rel="icon" href="img/logo.png" type="image/x-icon">
  <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="css/g.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Calculator-specific styles */
    .calc-wrapper {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .calc-section {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 32px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .calc-section label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 600;
      color: #0B1D3A;
      font-size: 0.95rem;
    }

    .calc-section select,
    .calc-section input[type="number"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 8px;
      border: 2px solid #e0e7ef;
      background: #fff;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .calc-section select:focus,
    .calc-section input:focus {
      outline: none;
      border-color: #1E90FF;
      box-shadow: 0 0 0 4px rgba(30, 144, 255, 0.1);
    }

    #extras {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    #extras label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 10px 14px;
      background: #f8fafc;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.3s ease;
      border: 1px solid transparent;
    }

    #extras label:hover {
      background: #eef5ff;
      border-color: rgba(30, 144, 255, 0.2);
    }

    #extras input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #1E90FF;
      flex-shrink: 0;
    }

    .calc-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #1E90FF, #00C9A7);
      color: #fff;
      border: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 4px 20px rgba(30, 144, 255, 0.35);
      margin-top: 8px;
    }

    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(30, 144, 255, 0.5);
    }

    .total {
      font-size: 1.5rem;
      text-align: center;
      margin-top: 20px;
      font-weight: 800;
      color: #0B1D3A;
      font-family: 'Outfit', sans-serif;
    }

    .calc-footer-links {
      text-align: center;
      margin-top: 32px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <header class="site-header" id="siteHeader">
    <div class="header-content">
      <a href="index.html" class="logo">Multi_Cleaning</a>
      <div class="header-phones">
        <a href="tel:+380986381008">📞 097 043 31 75</a>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul>
          <li><a href="index.html">Головна</a></li>
          <li><a href="contacts.html">Контакти</a></li>
        </ul>
      </nav>
      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>

  <section class="hero" style="min-height: 40vh; padding: 150px 24px 60px;">
    <div class="hero-content">
      <h1><span>Калькулятор</span> клінінгових послуг</h1>
      <p>Розрахуйте попередню вартість прибирання онлайн</p>
    </div>
  </section>

  <div class="calc-wrapper">
    <div class="calc-section fade-in">
      <label for="type">1. Вид прибирання:</label>
      <select id="type">
        <option value="100">Післябудівельне</option>
        <option value="80">Миття вікон</option>
        <option value="90">Генеральне</option>
        <option value="70">Хімчистка</option>
        <option value="60">Підтримуюче прибирання</option>
        <option value="110">Після пожежі</option>
        <option value="105">Після потопу</option>
        <option value="75">Обслуговування офісів</option>
      </select>

      <label for="service">2. Виберіть послугу:</label>
      <select id="service">
        <option>Прибирання квартири</option>
        <option>Прибирання будинку</option>
        <option>Прибирання офісу</option>
        <option>Прибирання комерційних приміщень</option>
      </select>

      <label for="area">3. Вкажіть площу приміщення (м²):</label>
      <input type="number" id="area" value="0" min="0">
    </div>

    <div class="calc-section fade-in">
      <label>4. Додаткові послуги:</label>
      <div id="extras">
        <label><input type="checkbox" value="200"> Хімчистка штор парою на місці</label>
        <label><input type="checkbox" value="150"> Миття гриля</label>
        <label><input type="checkbox" value="150"> Миття духової шафи</label>
        <label><input type="checkbox" value="150"> Миття витяжки</label>
        <label><input type="checkbox" value="100"> Миття посуду (1 год)</label>
        <label><input type="checkbox" value="200"> Миття всередині шаф та ящиків (кухня)</label>
        <label><input type="checkbox" value="100"> Миття мікрохвильової печі</label>
        <label><input type="checkbox" value="200"> Миття холодильника з морозильною камерою</label>
        <label><input type="checkbox" value="150"> Миття кухонної витяжки</label>
        <label><input type="checkbox" value="100"> Миття світильників (1 год)</label>
        <label><input type="checkbox" value="70"> Миття натяжної стелі (м²)</label>
        <label><input type="checkbox" value="250"> Зняття та вішання штор/тюлів</label>
        <label><input type="checkbox" value="150"> Миття віконних жалюзів</label>
        <label><input type="checkbox" value="150"> Миття рулонних штор на вікнах</label>
        <label><input type="checkbox" value="100"> Прасування білизни (1 год)</label>
        <label><input type="checkbox" value="250"> Дезінфекція поверхонь парою</label>
        <label><input type="checkbox" value="300"> Озонування приміщення</label>
      </div>
    </div>

    <div class="calc-section fade-in">
      <button class="calc-btn" onclick="calculateTotal()">💰 Розрахувати вартість</button>
      <p class="total" id="result">Разом: від 0 грн</p>
    </div>

    <div class="calc-footer-links">
      <a href="tel:+380986381008" class="link-button">📞 Зателефонувати</a>
      <a href="index.html" class="link-button">🏠 Головна</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Multi_Cleaning. Всі права захищені.</p>
  </footer>

  <a href="tel:+380986381008" class="floating-phone" title="Зателефонувати">📞</a>

  <script>
    function calculateTotal() {
      const typePrice = parseFloat(document.getElementById("type").value);
      const area = parseFloat(document.getElementById("area").value);
      let baseCost = typePrice * area;

      const extras = document.querySelectorAll('#extras input:checked');
      let extrasCost = 0;
      extras.forEach(el => extrasCost += parseFloat(el.value));

      let total = baseCost + extrasCost;
      document.getElementById("result").textContent = `Разом: від ${Math.round(total)} грн`;
    }

    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    if (menuToggle && navMenu) {
      menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('open');
        menuToggle.textContent = navMenu.classList.contains('open') ? '✕' : '☰';
      });
    }
    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 60); });
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
